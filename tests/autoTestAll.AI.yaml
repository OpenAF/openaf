include:
   - oJobTest.yaml

jobs:
   # ow.ai tests
   # --------------
   - name: AI::Init
     exec: |
       args.tests = require("autoTestAll.AI.js");

   - name: AI::Perceptron XOR
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAIPerceptronXOR;

   - name: AI::Perceptron XOR Put
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAIPerceptronXORPut;

   - name: AI::Perceptron XOR save and load
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAINetworkSave;

   - name: AI::Liquid XOR
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAILiquidXOR;

   - name: AI::LSTM AND
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAILSTMAND;     

   - name: AI::Perceptron network save and load
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAINetworkSave;

   - name: AI::Liquid network save and load
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAILiquidXORSave;

   - name: AI::LSTM network save and load
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAILSTMANDSave;

   - name: AI::Normalize with schema
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testNormalizeWithSchema;

   - name: AI::Normalize features array
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testFeaturesArray;

   - name: AI::Test ID3
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testID3;

   - name: AI::Test C45
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testC45;     

   - name: AI::Test KMeans
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testKMeans;  

   - name: AI::GPT prompt argument routing
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAIGPTPromptArgumentRouting;

   - name: AI::OpenAI tool recursion without duplication
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAIOpenAIToolRecursionNoDuplication;

   - name: AI::OpenAI streaming tool recursion without duplication
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAIOpenAIStreamingToolRecursionNoDuplication;

   - name: AI::Ollama streaming tool execution and ids
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAIOllamaStreamingToolExecutionAndConversationIds;

   - name: AI::Ollama streaming warmup on fresh conversation
     from: AI::Init
     to  : oJob Test
     exec: args.func = args.tests.testAIOllamaStreamingWarmsModelOnFreshConversation;

